<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홀가분 - 실전형 부채 탈출 솔루션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #ffffff; color: #212124; }
        
        .slide-in-right { animation: slideInRight 0.25s ease-out; }
        .slide-in-bottom { animation: slideInBottom 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        .golden-glow { animation: goldenGlow 2s infinite; }
        .spin-slow { animation: spin 2s linear infinite; }
        
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes slideInBottom { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes goldenGlow { 0% { box-shadow: 0 0 5px #fbbf24; } 50% { box-shadow: 0 0 20px #f59e0b; } 100% { box-shadow: 0 0 5px #fbbf24; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .text-point { color: #ff6f0f; }
        .bg-point { background-color: #ff6f0f; }
        .bg-gold { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); }

        .badge-daangn { background-color: #fff7f2; color: #ff6f0f; border: 1px solid #ffefe5; }
        .badge-bunjang { background-color: #fce8e8; color: #d32f2f; border: 1px solid #fadcdc; }
        .badge-joongna { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const formatKRW = (n) => new Intl.NumberFormat('ko-KR').format(n) + '원';

        // 1. 대형 시세 그래프 (상세 화면용)
        const LargePriceChart = ({ currentPrice, category }) => {
            const data = useMemo(() => {
                const points = [];
                const dropRate = category === 'electronics' ? 1.6 : 1.3;
                const startPrice = currentPrice * dropRate; 
                for (let i = 0; i <= 24; i++) {
                    const progress = i / 24;
                    const decay = Math.pow(1 - progress, category === 'electronics' ? 1.1 : 1.5);
                    points.push(Math.round(currentPrice + (startPrice - currentPrice) * decay));
                }
                points[24] = currentPrice;
                return points;
            }, [currentPrice, category]);

            const max = Math.max(...data); const min = Math.min(...data);
            const width = 340; const height = 150;
            const pointsStr = data.map((p, i) => `${(i / 24) * width},${height - ((p - min) / (max - min)) * (height - 30) - 10}`).join(' L ');

            return (
                <div className="w-full bg-white rounded-2xl p-5 border border-gray-100 shadow-sm mt-4">
                    <div className="flex justify-between items-end mb-4">
                        <div><h4 className="font-bold text-gray-800 text-sm tracking-tight">2년 시세 데이터 분석</h4><p className="text-[10px] text-gray-400 mt-0.5">전국 딜러 매입가/직거래가 통합</p></div>
                        <span className="text-xs font-bold text-point bg-orange-50 px-2 py-1 rounded-full">▼ {(100 - (currentPrice/data[0])*100).toFixed(1)}%</span>
                    </div>
                    <div className="relative h-[150px] w-full">
                        <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`} className="overflow-visible">
                            <path d={`M 0,${height} L ${pointsStr} L ${width},${height} Z`} fill="rgba(255, 111, 15, 0.05)" />
                            <path d={`M ${pointsStr}`} fill="none" stroke="#ff6f0f" strokeWidth="2.5" strokeLinecap="round" />
                            <circle cx={width} cy={height - ((data[24] - min) / (max - min)) * (height - 30) - 10} r="4" fill="white" stroke="#ff6f0f" strokeWidth="2" />
                        </svg>
                        <div className="flex justify-between text-[10px] text-gray-400 mt-3 border-t border-gray-50 pt-2"><span>24개월 전</span><span>12개월 전</span><span>현재</span></div>
                    </div>
                </div>
            );
        };

        // 2. 자산 등록 모달
        const AddAssetModal = ({ onClose, onAdd }) => {
            const [step, setStep] = useState(1);
            const [category, setCategory] = useState('luxury');
            const [name, setName] = useState('');
            const [releaseYear, setReleaseYear] = useState('');
            const [serial, setSerial] = useState('');
            const [images, setImages] = useState([]);
            const [estimatedPrice, setEstimatedPrice] = useState(null);
            const [finalPrice, setFinalPrice] = useState('');
            const [platforms, setPlatforms] = useState({ daangn: true, bunjang: false, joongna: false });
            const [verifyStatus, setVerifyStatus] = useState('idle');

            const fileInputRef = useRef(null);

            const handleStartVerification = () => {
                setVerifyStatus('checking');
                setTimeout(() => {
                    const base = category === 'luxury' ? 8500000 : 1200000;
                    const age = 2025 - (Number(releaseYear) || 2023);
                    const decay = category === 'luxury' ? 0.92 : 0.78;
                    const price = Math.floor(base * Math.pow(decay, age));
                    setEstimatedPrice(price);
                    setFinalPrice(price);
                    setVerifyStatus('done');
                    setTimeout(() => setStep(3), 800);
                }, 2000);
            };

            const togglePlatform = (p) => setPlatforms(prev => ({...prev, [p]: !prev[p]}));

            return (
                <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/40 backdrop-blur-sm" onClick={onClose}>
                    <div className="bg-white w-full max-w-md rounded-t-[2.5rem] p-6 slide-in-bottom h-[92vh] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-6">
                            <button onClick={onClose} className="text-gray-400 p-2 hover:bg-gray-100 rounded-full transition"><Icon name="x" /></button>
                            <h3 className="font-bold text-lg">자산 등록 및 검증</h3>
                            <div className="w-10"></div>
                        </div>

                        <div className="flex-1 overflow-y-auto no-scrollbar space-y-8 pb-10">
                            <div className="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
                                <button onClick={() => fileInputRef.current.click()} className="w-20 h-20 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center text-gray-300 shrink-0 hover:border-point hover:text-point transition">
                                    <Icon name="camera" size={24} />
                                    <span className="text-[10px] font-bold mt-1">{images.length}/10</span>
                                </button>
                                <input type="file" multiple accept="image/*" className="hidden" ref={fileInputRef} onChange={(e) => setImages([...images, ...Array.from(e.target.files).map(f => URL.createObjectURL(f))])} />
                                {images.map((img, i) => (<div key={i} className="w-20 h-20 rounded-2xl overflow-hidden shrink-0 border border-gray-100 relative shadow-sm"><img src={img} className="w-full h-full object-cover" /></div>))}
                            </div>

                            {step === 1 && (
                                <div className="space-y-6 fade-in">
                                    <div className="flex bg-gray-100 p-1.5 rounded-2xl">
                                        <button onClick={() => setCategory('luxury')} className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition ${category === 'luxury' ? 'bg-white text-gray-900 shadow-md' : 'text-gray-400'}`}>명품 자산</button>
                                        <button onClick={() => setCategory('electronics')} className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition ${category === 'electronics' ? 'bg-white text-gray-900 shadow-md' : 'text-gray-400'}`}>전자제품 자산</button>
                                    </div>
                                    <div className="space-y-4">
                                        <input value={name} onChange={e=>setName(e.target.value)} placeholder="상품명 (브랜드 및 모델명)" className="w-full text-lg border-b border-gray-100 py-3 outline-none font-bold" />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input type="number" value={releaseYear} onChange={e=>setReleaseYear(e.target.value)} placeholder="출시년도" className="w-full border-b border-gray-100 py-3 outline-none text-sm" />
                                            <input value={serial} onChange={e=>setSerial(e.target.value)} placeholder="시리얼/모델번호" className="w-full border-b border-gray-100 py-3 outline-none text-sm" />
                                        </div>
                                    </div>
                                    <button onClick={() => setStep(2)} disabled={!name || !releaseYear} className="w-full py-4 bg-slate-900 text-white rounded-[1.5rem] font-bold mt-4 disabled:opacity-30">다음 단계 (데이터 검증)</button>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="flex-1 flex flex-col items-center justify-center text-center space-y-6 fade-in py-10 px-4">
                                    <div className={`relative w-24 h-24 rounded-[2rem] flex items-center justify-center transition-all ${verifyStatus === 'checking' ? 'bg-orange-50 text-point animate-pulse border-2 border-point shadow-[0_0_15px_rgba(255,111,15,0.2)]' : 'bg-slate-50 text-slate-300'}`}>
                                        <Icon name={verifyStatus === 'done' ? "check-circle" : "shield-check"} size={48} />
                                    </div>
                                    <div>
                                        <h4 className="text-xl font-black tracking-tight">{verifyStatus === 'checking' ? '데이터 정밀 분석 중' : '2단계 검증 엔진'}</h4>
                                        <p className="text-sm text-gray-400 mt-2 leading-relaxed">헤이딜러 방식의 시리얼 논리 체크와<br/>AI 미세 패턴 분석을 병행합니다.</p>
                                    </div>
                                    {verifyStatus === 'idle' && <button onClick={handleStartVerification} className="px-10 py-3.5 bg-slate-900 text-white rounded-2xl font-bold shadow-xl">검증 시작</button>}
                                </div>
                            )}

                            {step === 3 && (
                                <div className="space-y-8 fade-in">
                                    <div className="bg-emerald-50 border border-emerald-100 p-5 rounded-3xl text-center">
                                        <div className="flex justify-center mb-2 text-emerald-500"><Icon name="check-circle" size={32} /></div>
                                        <h4 className="font-bold text-emerald-900">정품 및 시세 인증 완료</h4>
                                        <p className="text-[10px] text-emerald-600 mt-1 opacity-70 tracking-widest uppercase font-black">Authentication Success 98%</p>
                                    </div>
                                    <div className="space-y-6">
                                        <div>
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">AI Estimated Price</label>
                                            <div className="mt-2 p-4 bg-slate-50 rounded-2xl border border-slate-100 flex justify-between items-center">
                                                <span className="text-sm font-bold text-slate-500">평균 매입 시세</span>
                                                <span className="text-xl font-black text-slate-900">{formatKRW(estimatedPrice)}</span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Final Exit Price</label>
                                            <input type="number" value={finalPrice} onChange={e=>setFinalPrice(e.target.value)} className="w-full text-2xl font-black border-b-2 border-gray-100 py-3 outline-none focus:border-point transition bg-transparent" />
                                            <p className="text-[11px] text-gray-400 mt-2">최종 매각 희망가를 입력하세요. 딜러 경매의 기준가가 됩니다.</p>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Platform Sync</label>
                                            <div className="flex gap-2 mt-3">
                                                {['daangn', 'bunjang', 'joongna'].map(p => (
                                                    <button key={p} onClick={() => togglePlatform(p)} className={`flex-1 py-4 rounded-2xl border-2 text-[13px] font-black transition flex flex-col items-center gap-2 ${platforms[p] ? 'border-point text-point bg-orange-50' : 'border-gray-100 text-gray-300'}`}>
                                                        {p === 'daangn' ? '🥕 당근' : p === 'bunjang' ? '⚡ 번개' : '🌲 중고'}
                                                        {platforms[p] && <Icon name="check" size={12} />}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={() => {
                                        onAdd({ id: Date.now(), name, price: Number(finalPrice), releaseYear, category, thumbnail: images[0], platforms: Object.keys(platforms).filter(k=>platforms[k]), isSold: false });
                                        onClose();
                                    }} className="w-full py-4 bg-slate-900 text-white rounded-[2rem] font-black text-lg shadow-2xl active:scale-95 transition">홀가분하게 등록하기</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // 3. 자산 상세 뷰
        const AssetDetailView = ({ item, onBack, onToggleSold, debtTotal }) => {
            const bids = useMemo(() => [
                { id: 1, dealer: '프리미엄 구구스', price: item.price + 200000, time: '3분 전' },
                { id: 2, dealer: '민트급 팩토리', price: item.price + 50000, time: '12분 전' },
                { id: 3, dealer: '명품의 품격', price: item.price - 100000, time: '1시간 전' },
            ], [item.price]);

            const highestBid = bids[0].price;
            const canExit = highestBid >= debtTotal;

            const getIcon = (cat) => {
                if (cat === 'luxury' || cat === 'fashion') return 'package';
                if (cat === 'electronics') return 'smartphone';
                return 'package';
            };

            return (
                <div className="absolute inset-0 bg-white z-50 flex flex-col slide-in-right overflow-hidden">
                    <div className="px-5 py-4 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white z-10">
                        <div className="flex items-center gap-3"><button onClick={onBack} className="p-2 hover:bg-gray-100 rounded-full transition"><Icon name="chevron-left" /></button><h3 className="font-bold text-lg">자산 관리 리포트</h3></div>
                        <button onClick={onBack} className="p-2 text-gray-400"><Icon name="x" /></button>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto pb-24 no-scrollbar bg-slate-50/30">
                        <div className="w-full h-80 bg-gray-100 flex items-center justify-center relative border-b border-gray-100 shadow-inner">
                            {item.thumbnail ? <img src={item.thumbnail} className="w-full h-full object-cover" /> : <Icon name={getIcon(item.category)} size={80} className="text-gray-300" />}
                            {item.isSold && <div className="absolute inset-0 bg-black/50 flex items-center justify-center font-black text-white uppercase tracking-[0.3em] text-2xl backdrop-blur-sm">Exit Success</div>}
                        </div>

                        <div className="p-5">
                            <div className="flex justify-between items-start mb-2">
                                <h2 className="text-2xl font-black text-gray-900 tracking-tight leading-tight">{item.name}</h2>
                                <span className={`px-2 py-1 rounded-[10px] text-[10px] font-black border uppercase tracking-wider ${item.isSold ? 'bg-gray-100 border-gray-200 text-gray-400' : 'bg-green-50 border-green-200 text-green-600'}`}>{item.isSold ? 'EXITED' : 'ON BIDDING'}</span>
                            </div>
                            <div className="flex gap-2 mb-6">
                                {item.platforms.map(p => {
                                    const labels = { daangn: '당근', bunjang: '번개', joongna: '중고' };
                                    const classes = { daangn: 'badge-daangn', bunjang: 'badge-bunjang', joongna: 'badge-joongna' };
                                    return <span key={p} className={`text-[9px] px-2 py-0.5 rounded-full font-bold border ${classes[p]}`}>{labels[p]} 등록중</span>;
                                })}
                            </div>

                            <div className="bg-slate-900 text-white p-6 rounded-[2.5rem] shadow-2xl mb-8 relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-6 opacity-10"><Icon name="zap" size={80} /></div>
                                <p className="text-[10px] font-black text-orange-400 uppercase tracking-widest mb-1">Exit Strategy Analysis</p>
                                <h3 className="text-xl font-bold">부채 전액 청산 가능!</h3>
                                <p className="text-xs opacity-70 mt-2 leading-relaxed">최고 입찰가 <strong>{formatKRW(highestBid)}</strong> 기준,<br/>모든 빚을 갚고도 <strong>{formatKRW(highestBid - debtTotal)}</strong>가 남습니다.</p>
                                <div className="mt-6 pt-6 border-t border-white/10 flex justify-between items-end">
                                    <div><p className="text-[9px] opacity-40 uppercase font-bold mb-1">Current Highest Bid</p><p className="text-2xl font-black text-white">{formatKRW(highestBid)}</p></div>
                                    <div className="text-right"><p className="text-[9px] opacity-40 uppercase font-bold mb-1">Total Debt</p><p className="text-lg font-bold text-orange-400">{formatKRW(debtTotal)}</p></div>
                                </div>
                            </div>

                            <div className="mb-10">
                                <h4 className="font-black text-sm text-gray-800 mb-5 flex items-center gap-2"><Icon name="gavel" size={18} /> 실시간 프리미엄 입찰 현황</h4>
                                <div className="space-y-3">
                                    {bids.map((bid, i) => (
                                        <div key={bid.id} className={`p-5 bg-white border rounded-3xl flex justify-between items-center transition hover:shadow-md ${i === 0 ? 'border-point ring-1 ring-point shadow-sm' : 'border-gray-100 shadow-sm'}`}>
                                            <div>
                                                <div className="flex items-center gap-2">
                                                    <p className="font-bold text-sm text-gray-900">{bid.dealer}</p>
                                                    {i === 0 && <span className="bg-point text-white text-[8px] px-2 py-0.5 rounded-full font-black uppercase">Highest</span>}
                                                </div>
                                                <p className="text-[10px] text-gray-400 mt-0.5">{bid.time} 인증 매칭</p>
                                            </div>
                                            <p className={`font-black tracking-tighter ${i === 0 ? 'text-point text-xl' : 'text-gray-900 text-lg'}`}>{formatKRW(bid.price)}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <LargePriceChart currentPrice={item.price} category={item.category} />
                        </div>
                    </div>
                    <div className="p-5 border-t border-gray-100 bg-white sticky bottom-0 z-20 shadow-[0_-5px_15px_rgba(0,0,0,0.02)]">
                        <button onClick={() => { onToggleSold(item.id); onBack(); }} className="w-full bg-point text-white py-5 rounded-[2rem] font-black text-lg shadow-xl shadow-orange-100 active:scale-95 transition hover:bg-orange-600 uppercase tracking-widest">SELL TO BEST BIDDER & EXIT</button>
                    </div>
                </div>
            );
        };

        // --- Main App ---
        const App = () => {
            const [view, setView] = useState('home');
            const [showAdd, setShowAdd] = useState(false);
            const [selectedAsset, setSelectedAsset] = useState(null);

            // 신규 추가된 스마트 연동 상태
            const [syncStep, setSyncStep] = useState('intro');
            const [syncedItems, setSyncedItems] = useState([]);

            const [debts] = useState([
                { id: 1, name: 'S카드 리볼빙', amount: 3500000, rate: 18.5, type: 'revolving' }, 
                { id: 2, name: 'K은행 신용대출', amount: 5500000, rate: 5.5, type: 'loan' }
            ]);
            
            const [items, setItems] = useState([
                { id: 201, name: '샤넬 보이백 미디움', price: 9200000, releaseYear: 2021, category: 'luxury', thumbnail: null, platforms: ['daangn', 'bunjang'], isSold: false },
                { id: 202, name: '맥북 프로 16 M3 Max', price: 4800000, releaseYear: 2023, category: 'electronics', thumbnail: null, platforms: ['daangn'], isSold: false }
            ]);
            
            const totalDebt = debts.reduce((a,c) => a+c.amount, 0);
            const sellableTotal = items.filter(i => !i.isSold).reduce((a,c) => a+c.price, 0);
            const netWorth = (sellableTotal + 1200000) - totalDebt;

            const goldenExitAsset = useMemo(() => items.find(i => !i.isSold && i.price >= totalDebt), [items, totalDebt]);

            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [view, selectedAsset, showAdd, items, syncStep, syncedItems]);

            const format = (n) => new Intl.NumberFormat('ko-KR').format(n);
            const toggleSold = (id) => setItems(prev => prev.map(i => i.id === id ? { ...i, isSold: !i.isSold } : i));

            // 신규 추가: 자동 연동 로직
            const startAssetSync = () => {
                setSyncStep('loading');
                setTimeout(() => {
                    setSyncedItems([
                        { id: 301, name: 'LG 스탠바이미 27인치', originalPrice: 1040000, currentPrice: 750000, source: '오늘의집', category: 'electronics' },
                        { id: 302, name: '다이슨 에어랩 멀티 스타일러', originalPrice: 749000, currentPrice: 520000, source: 'SSG/쿠팡', category: 'electronics' },
                        { id: 303, name: '메종 마르지엘라 레플리카 스니커즈', originalPrice: 540000, currentPrice: 480000, source: '크림(KREAM)', category: 'fashion' }
                    ]);
                    setSyncStep('dashboard');
                }, 2500);
            };

            const moveToAsset = (sItem) => {
                setItems([{
                    id: Date.now(),
                    name: sItem.name,
                    price: sItem.currentPrice,
                    releaseYear: 2024,
                    category: sItem.category,
                    thumbnail: null,
                    platforms: ['daangn'],
                    isSold: false
                }, ...items]);
                setSyncedItems(prev => prev.filter(i => i.id !== sItem.id));
                alert(`[${sItem.name}]이(가) 자산 처분 허브로 이동되었습니다!`);
            };

            const getIcon = (cat) => {
                if (cat === 'luxury' || cat === 'fashion') return 'package';
                if (cat === 'electronics') return 'smartphone';
                return 'package';
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white flex flex-col relative shadow-2xl overflow-hidden text-slate-900 border-x border-gray-100">
                    <header className="px-6 py-4 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur-md z-30 border-b border-gray-50 h-16">
                        <h1 className="text-2xl font-black tracking-tighter text-slate-900">홀가분</h1>
                        <div className="flex gap-4">
                            <button className="p-1 hover:bg-gray-100 rounded-lg transition text-slate-400"><Icon name="search" /></button>
                            <div className="relative"><button className="p-1 hover:bg-gray-100 rounded-lg transition text-slate-400"><Icon name="bell" /></button><span className="absolute top-1 right-1 w-2.5 h-2.5 bg-orange-500 rounded-full border-2 border-white"></span></div>
                        </div>
                    </header>

                    <main className="flex-1 pb-24 overflow-y-auto no-scrollbar bg-slate-50/20">
                        
                        {/* 탭 1: 기존 홈 화면 (원본 그대로 복구) */}
                        {view === 'home' && (
                            <div className="fade-in p-5 space-y-8">
                                {goldenExitAsset && (
                                    <div onClick={() => setSelectedAsset(goldenExitAsset)} className="bg-gold p-6 rounded-[2.5rem] text-white shadow-2xl golden-glow relative overflow-hidden cursor-pointer active:scale-95 transition">
                                        <div className="absolute top-0 right-0 p-4 opacity-20"><Icon name="sparkles" size={100} /></div>
                                        <div className="relative z-10">
                                            <span className="bg-white/30 text-[9px] font-black px-2.5 py-1 rounded-full backdrop-blur-md tracking-widest uppercase">Golden Exit Signal</span>
                                            <h3 className="text-2xl font-black mt-3 leading-tight tracking-tight">지금 "{goldenExitAsset.name}"을 팔면<br/>모든 빚이 사라집니다!</h3>
                                            <p className="mt-4 text-xs font-bold text-white/80">최고가 입찰자 매칭 완료</p>
                                        </div>
                                    </div>
                                )}

                                <section>
                                    <div className="flex justify-between items-end mb-4">
                                        <div><p className="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Net Worth Summary</p><h2 className="text-3xl font-black mt-1 tracking-tighter">{format(netWorth)}원</h2></div>
                                        <Icon name="activity" className="text-emerald-500 mb-1" />
                                    </div>
                                    <div className="mt-4 flex h-3 w-full bg-gray-100 rounded-full overflow-hidden shadow-inner">
                                        <div className="bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.3)]" style={{width: '35%'}}></div>
                                        <div className="bg-red-400" style={{width: '65%'}}></div>
                                    </div>
                                    <div className="flex justify-between text-[11px] text-gray-400 mt-2 font-bold uppercase tracking-tighter"><span>Asset {format(sellableTotal + 1200000)}</span><span>Debt {format(totalDebt)}</span></div>
                                </section>

                                <div className="bg-yellow-50 p-5 rounded-[2rem] border border-yellow-100 shadow-sm">
                                    <div className="flex items-center gap-2 mb-2"><span className="bg-yellow-400 text-yellow-900 text-[10px] font-black px-2 py-0.5 rounded-full uppercase">AI Guide</span><h3 className="font-bold text-sm text-yellow-900">손해 보는 구조 발견!</h3></div>
                                    <p className="text-sm text-gray-700 leading-relaxed font-medium">정기예금 깨서 S카드 리볼빙 갚으세요.<br/><span className="text-point font-black">💰 연 3,750,000원 즉시 이득</span></p>
                                </div>

                                <section>
                                    <h3 className="font-black text-xl mb-4 tracking-tight">상환 우선순위</h3>
                                    <div className="space-y-2">
                                        {debts.map(debt => (
                                            <div key={debt.id} className="flex justify-between items-center py-5 px-6 bg-white border border-gray-50 rounded-[2rem] shadow-sm active:bg-slate-50 transition">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${debt.rate>=10?'bg-red-50 text-red-500':'bg-blue-50 text-blue-500'}`}><Icon name={debt.type === 'loan' ? 'landmark' : 'credit-card'} /></div>
                                                    <div><p className="font-black text-[15px] text-gray-900 tracking-tight">{debt.name}</p><p className="text-xs text-gray-400 font-bold">이자율 연 {debt.rate}%</p></div>
                                                </div>
                                                <div className="text-right">
                                                    <p className="font-black text-sm text-gray-900">{format(debt.amount)}원</p>
                                                    <Icon name="chevron-right" className="text-gray-300 inline-block mt-1" size={16} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section>
                                    <div className="flex justify-between items-center mb-5"><h3 className="font-black text-xl tracking-tight">내 자산 그리드</h3><button onClick={() => setView('report')} className="text-xs font-black text-slate-400 hover:text-point transition uppercase tracking-widest">View All</button></div>
                                    <div className="grid grid-cols-2 gap-5">
                                        {items.map(item => (
                                            <div key={item.id} onClick={() => setSelectedAsset(item)} className={`border border-slate-100 rounded-[2.5rem] p-5 shadow-sm relative transition active:scale-95 bg-white group hover:shadow-xl ${item.isSold ? 'opacity-40 grayscale' : ''}`}>
                                                <div className="w-full aspect-square bg-slate-50 rounded-3xl mb-4 flex items-center justify-center text-slate-300 shadow-inner group-hover:scale-105 transition-transform overflow-hidden">
                                                    {item.thumbnail ? <img src={item.thumbnail} className="w-full h-full object-cover" /> : <Icon name={getIcon(item.category)} size={48} />}
                                                    {item.isSold && <div className="absolute inset-0 bg-slate-900/10 flex items-center justify-center text-[11px] font-black text-slate-600 tracking-[0.3em] uppercase">EXITED</div>}
                                                </div>
                                                <p className="text-[14px] font-bold text-slate-900 truncate tracking-tight">{item.name}</p>
                                                <p className="text-[14px] font-black text-point mt-0.5">{format(item.price)}원</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <div className="bg-slate-900 text-white p-8 rounded-[3rem] shadow-2xl relative overflow-hidden group">
                                    <div className="absolute -top-10 -left-10 w-40 h-40 bg-blue-500 rounded-full opacity-5 blur-3xl group-hover:opacity-10 transition-opacity"></div>
                                    <div className="flex justify-between items-start mb-6"><div><p className="text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em] mb-1">Debt-Free Roadmap</p><h3 className="text-xl font-bold tracking-tight leading-tight">2026년 3월에 당신은<br/>완전히 홀가분해집니다! 🎉</h3></div><Icon name="flag" className="text-emerald-400" size={28} /></div>
                                    <div className="w-full bg-white/10 h-2 rounded-full overflow-hidden"><div className="bg-emerald-400 h-full w-[45%] rounded-full shadow-[0_0_15px_rgba(52,211,153,0.5)]"></div></div>
                                    <p className="text-[11px] text-gray-400 mt-4 text-right font-bold uppercase tracking-widest">9 Months to Freedom</p>
                                </div>
                            </div>
                        )}

                        {/* 신규 탭: 스마트 연동 (가전 + 패션 자동 불러오기) */}
                        {view === 'sync' && (
                            <div className="fade-in bg-white min-h-full">
                                {syncStep === 'intro' && (
                                    <div className="p-8 flex flex-col h-[70vh] justify-center">
                                        <div className="w-20 h-20 bg-slate-900 text-white rounded-3xl flex items-center justify-center mb-6 shadow-xl"><Icon name="refresh-cw" size={40} /></div>
                                        <h2 className="text-3xl font-black text-slate-900 mb-4 leading-tight">안 쓰는 가전,<br/>입지 않는 옷 찾아드려요.</h2>
                                        <p className="text-slate-500 mb-10 font-medium leading-relaxed">자주 이용하는 쇼핑몰을 한 번만 연결하면,<br/>집에 잠든 가전과 패션 자산의 현재 중고 시세를<br/>자동으로 분석해 드립니다.</p>
                                        
                                        <div className="space-y-3 mb-10">
                                            <label className="flex items-center justify-between p-4 border rounded-2xl cursor-pointer hover:border-slate-900 bg-slate-50 transition">
                                                <div className="flex items-center gap-3"><div className="w-10 h-10 bg-blue-400 text-white rounded-xl flex items-center justify-center font-bold text-xs shadow-sm"><Icon name="home" size={16}/></div><span className="font-bold text-slate-800">오늘의집 / 쿠팡</span></div>
                                                <input type="checkbox" className="w-5 h-5 accent-slate-900" defaultChecked />
                                            </label>
                                            <label className="flex items-center justify-between p-4 border rounded-2xl cursor-pointer hover:border-slate-900 bg-slate-50 transition">
                                                <div className="flex items-center gap-3"><div className="w-10 h-10 bg-gray-800 text-white rounded-xl flex items-center justify-center font-bold text-xs shadow-sm"><Icon name="tv" size={16}/></div><span className="font-bold text-slate-800">삼성 / LG 구매내역</span></div>
                                                <input type="checkbox" className="w-5 h-5 accent-slate-900" defaultChecked />
                                            </label>
                                            <label className="flex items-center justify-between p-4 border rounded-2xl cursor-pointer hover:border-slate-900 bg-slate-50 transition">
                                                <div className="flex items-center gap-3"><div className="w-10 h-10 bg-black text-white rounded-xl flex items-center justify-center font-bold text-[10px] shadow-sm">KREAM</div><span className="font-bold text-slate-800">크림 / 무신사</span></div>
                                                <input type="checkbox" className="w-5 h-5 accent-slate-900" defaultChecked />
                                            </label>
                                        </div>
                                        <button onClick={startAssetSync} className="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-black text-lg shadow-xl active:scale-95 transition">데이터 안전하게 연동하기</button>
                                    </div>
                                )}

                                {syncStep === 'loading' && (
                                    <div className="p-8 flex flex-col h-[70vh] justify-center items-center text-center">
                                        <Icon name="loader-2" size={48} className="text-point spin-slow mb-6" />
                                        <h2 className="text-xl font-black text-slate-900 mb-2">가전/패션 자산 분석 중...</h2>
                                        <p className="text-sm text-slate-500">최근 구매 내역과<br/>현재 리셀 시장 시세를 매칭하고 있습니다.</p>
                                    </div>
                                )}

                                {syncStep === 'dashboard' && (
                                    <div className="fade-in p-5 space-y-8">
                                        <div className="flex justify-between items-end mb-4 px-2">
                                            <div><h3 className="font-black text-xl tracking-tight">발견된 숨은 자산</h3><p className="text-xs text-slate-400 font-bold mt-1">총 {syncedItems.length}개의 가전/패션 자동 등록됨</p></div>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            {syncedItems.map(sItem => (
                                                <div key={sItem.id} className="p-5 bg-white border border-slate-100 rounded-[2rem] shadow-sm relative overflow-hidden group">
                                                    {sItem.originalPrice > sItem.currentPrice ? (
                                                        <div className="absolute top-0 right-0 bg-red-50 text-red-600 px-3 py-1 text-[10px] font-black rounded-bl-2xl border-b border-l border-red-100">가치 하락중! 처분 권장</div>
                                                    ) : (
                                                        <div className="absolute top-0 right-0 bg-emerald-50 text-emerald-600 px-3 py-1 text-[10px] font-black rounded-bl-2xl border-b border-l border-emerald-100">프리미엄 상승중!</div>
                                                    )}
                                                    
                                                    <div className="flex items-center gap-2 mt-2 mb-2">
                                                        <Icon name={getIcon(sItem.category)} size={14} className="text-slate-400" />
                                                        <p className="text-[10px] font-bold text-slate-400">{sItem.source}</p>
                                                    </div>
                                                    <h4 className="font-bold text-slate-900 mb-3 truncate pr-16">{sItem.name}</h4>
                                                    
                                                    <div className="flex justify-between items-end bg-slate-50 p-4 rounded-2xl">
                                                        <div>
                                                            <p className="text-[10px] text-slate-400 font-bold mb-1">현재 예상 리셀가</p>
                                                            <p className="font-black text-lg text-slate-900">{format(sItem.currentPrice)}원</p>
                                                        </div>
                                                        <button onClick={() => moveToAsset(sItem)} className="text-[11px] font-black bg-slate-900 text-white px-4 py-2 rounded-xl active:scale-95 transition shadow-md hover:bg-slate-800">
                                                            처분 허브로 이동
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                            {syncedItems.length === 0 && (
                                                <div className="text-center py-10 text-slate-400 font-bold text-sm bg-slate-50 rounded-3xl">연동된 자산이 모두 처분 허브로 이동되었습니다! 🎉</div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 탭 3: 기존 자산처분 화면 (원본 그대로 복구) */}
                        {view === 'report' && (
                            <div className="fade-in bg-white min-h-full">
                                <div className="p-8 border-b border-gray-100 bg-white sticky top-0 z-10 flex justify-between items-end">
                                    <div><h2 className="text-2xl font-black tracking-tight">자산 처분 허브</h2><p className="text-xs text-slate-400 mt-1 font-bold">인증 완료된 자산 {items.length}개</p></div>
                                    <div className="flex items-center gap-2 bg-orange-50 px-3 py-1.5 rounded-full"><span className="w-2 h-2 bg-point rounded-full animate-ping"></span><span className="text-[10px] font-black text-point uppercase tracking-widest">Live Auction</span></div>
                                </div>
                                <div className="divide-y divide-gray-50">
                                    {items.map(item => (
                                        <div key={item.id} onClick={() => setSelectedAsset(item)} className={`p-8 flex gap-6 transition active:bg-slate-50 ${item.isSold ? 'opacity-40' : ''}`}>

                                                {item.isSold && <div className="absolute inset-0 bg-black/40 flex items-center justify-center text-[11px] font-black text-white uppercase tracking-widest">SOLD</div>}
                                            </div>
                                            <div className="flex-1 flex flex-col justify-between py-1">
                                                <div>
                                                    <div className="flex justify-between items-start"><h4 className="text-[17px] font-black text-slate-900 tracking-tight leading-tight">{item.name}</h4><button onClick={(e) => { e.stopPropagation(); toggleSold(item.id); }} className={`text-[10px] px-3 py-1 rounded-full border font-black transition ${item.isSold ? 'border-gray-200 text-gray-400' : 'border-point text-point bg-orange-50'}`}>{item.isSold ? '상환완료' : '판매확정'}</button></div>
                                                    <div className="flex gap-2 mt-2">
                                                        <span className={`text-[9px] font-black px-2 py-0.5 rounded-full border ${item.category==='luxury' ? 'border-purple-200 text-purple-600 bg-purple-50' : 'border-blue-200 text-blue-600 bg-blue-50'}`}>{item.category==='luxury' ? 'LUXURY' : 'ELECTRONICS'}</span>
                                                        <span className="text-[9px] font-black text-gray-300 uppercase tracking-widest mt-0.5">{item.releaseYear} EDITION</span>
                                                    </div>
                                                </div>
                                                <div className="flex justify-between items-end mt-4">
                                                    <p className="font-black text-xl text-slate-900 tracking-tighter">{format(item.price)}원</p>
                                                    <p className="text-[11px] font-black text-point flex items-center gap-1 underline underline-offset-4 decoration-2">경매 참여중 <Icon name="chevron-right" size={12} /></p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-8">
                                    <button onClick={() => setShowAdd(true)} className="w-full py-5 border-2 border-dashed border-gray-200 rounded-[2rem] flex items-center justify-center gap-3 text-slate-400 font-black hover:bg-slate-50 hover:border-point/30 hover:text-point transition shadow-sm"><Icon name="plus" size={24} /> 새 자산 수동 추가하기</button>
                                </div>
                            </div>
                        )}

                        {/* 탭 4: 기존 내 정보 화면 (원본 그대로 복구) */}
                        {view === 'myinfo' && (
                            <div className="fade-in p-6 space-y-8">
                                <h2 className="text-2xl font-black tracking-tight">마이 리포트</h2>
                                <div className="p-10 bg-slate-900 rounded-[3rem] text-white shadow-2xl relative overflow-hidden text-center">
                                    <div className="absolute top-0 right-0 p-6 opacity-10"><Icon name="award" size={100} /></div>
                                    <p className="text-xs font-black text-orange-400 tracking-[0.3em] mb-2 uppercase opacity-80">Holgabun Master</p>
                                    <h4 className="text-2xl font-black tracking-tight">상위 5% 홀가분 러</h4>
                                    <p className="text-sm text-slate-400 mt-3 leading-relaxed">지금까지 총 <strong>2,450만원</strong>의<br/>부채를 성공적으로 털어냈습니다.</p>
                                </div>
                                <div className="grid grid-cols-2 gap-5">
                                    <div className="p-8 bg-white border border-gray-100 rounded-[2.5rem] shadow-sm text-center flex flex-col items-center"><div className="w-12 h-12 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center mb-3 shadow-sm shadow-blue-100"><Icon name="shield-check" /></div><p className="text-[10px] font-black text-gray-300 uppercase tracking-widest">Certified</p><p className="text-2xl font-black mt-1">12건</p></div>
                                    <div className="p-8 bg-white border border-gray-100 rounded-[2.5rem] shadow-sm text-center flex flex-col items-center"><div className="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center mb-3 shadow-sm shadow-emerald-100"><Icon name="trending-up" /></div><p className="text-[10px] font-black text-gray-300 uppercase tracking-widest">Avg Gain</p><p className="text-2xl font-black mt-1">+12.4%</p></div>
                                </div>
                            </div>
                        )}
                    </main>

                    {showAdd && <AddAssetModal onClose={() => setShowAdd(false)} onAdd={item => setItems([item, ...items])} />}
                    {selectedAsset && <AssetDetailView item={selectedAsset} onBack={() => setSelectedAsset(null)} onToggleSold={toggleSold} debtTotal={totalDebt} />}

                    {/* 하단 네비게이션 (스마트 연동을 포함한 4개 탭으로 구성) */}
                    <nav className="fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-xl border-t border-gray-100 flex justify-around items-center pb-8 pt-4 z-40 px-2 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
                        {[ 
                            { id: 'home', label: '홈', icon: 'home' }, 
                            { id: 'sync', label: '스마트연동', icon: 'refresh-cw' }, 
                            { id: 'report', label: '자산처분', icon: 'banknote' },
                            { id: 'myinfo', label: '내 정보', icon: 'user' }
                        ].map(item => {
                            const active = view === item.id;
                            return (
                                <button key={item.id} onClick={() => setView(item.id)} className={`flex flex-col items-center gap-1.5 transition-all duration-300 py-2 px-4 rounded-2xl ${active ? 'text-slate-900 scale-110' : 'text-slate-300'}`}>
                                    <Icon name={item.icon} size={24} className={active ? "stroke-[3]" : "opacity-60"} />
                                    <span className="text-[10px] font-black uppercase tracking-widest">{item.label}</span>
                                    {active && <div className="absolute -top-1 w-1.5 h-1.5 bg-point rounded-full animate-bounce"></div>}
                                </button>
                            );
                        })}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
